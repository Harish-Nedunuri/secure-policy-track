name: Build and Test Python Package

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'  

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      # Step 4: Run unit tests with pytest
      - name: Run tests
        run: |
          pip install pytest
          pytest -vv

      # Step 5: Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
  
      # Step 6: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # Step 7: Set Docker image tag
      - name: Set Docker image tag
        id: set-image-tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "image_tag=policytrack:dev" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "image_tag=policytrack:latest" >> $GITHUB_ENV
          fi
      
      # Step 8: Log in to Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.CONTAINER_REGISTRY_SERVER }}
          username: ${{ secrets.CONTAINER_REGISTRY_ADMIN }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      # Step 9: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags:  ${{ secrets.CONTAINER_REGISTRY_SERVER }}/${{ env.image_tag }}
